version: '3.8'

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

services:

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: teamhub-api
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_ACCESS_EXPIRES=${JWT_ACCESS_EXPIRES}
      - JWT_REFRESH_EXPIRES=${JWT_REFRESH_EXPIRES}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - AI_SERVICE_URL=http://ai:8000
      - AI_SERVICE_URL_EXTERNAL=http://localhost:8000
      - AI_SERVICE_TOKEN=${AI_SERVICE_TOKEN}
      - FRONTEND_URL=http://localhost:5173
      - CORS_ORIGIN=http://localhost:5173
      - PORT=3000
    command: sh -c "pnpm --filter @teamhub/api exec prisma migrate deploy && pnpm --filter @teamhub/api start"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - frontend
      - backend

  ai:
    build:
      context: ./apps/ai
      dockerfile: Dockerfile
    container_name: teamhub-ai
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL_AI}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - AI_SERVICE_TOKEN=${AI_SERVICE_TOKEN}
    depends_on:
      api:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks:
      - backend

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: teamhub-web
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - frontend

